name: netaro-router

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: netaro
      POSTGRES_USER: netaro
      POSTGRES_PASSWORD: netaro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netaro -d netaro"]
      interval: 2s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://netaro:netaro@db:5432/netaro
      PAYOUT_MODE: ${PAYOUT_MODE:-random}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:

name: netaro-router

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: netaro
      POSTGRES_USER: netaro
      POSTGRES_PASSWORD: netaro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netaro -d netaro"]
      interval: 2s
      timeout: 5s
      retries: 10
